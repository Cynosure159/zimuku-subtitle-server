name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements.prod.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock pytest-asyncio

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format
        run: ruff format --check .

      - name: Run pytest
        run: |
          export PYTHONPATH=${{ github.workspace }}
          pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Run lint
        working-directory: frontend
        run: npm run lint

  docker:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config

      - name: Validate develop compose file
        run: docker compose -f docker-compose.yml -f docker-compose.develop.yml config

      - name: Build backend runtime image
        run: docker build --file Dockerfile --target runtime --tag zimuku-backend:test .

      - name: Build backend develop image
        run: docker build --file Dockerfile --target develop --tag zimuku-backend:test-develop .

      - name: Build frontend image
        run: docker build --file Dockerfile --tag zimuku-frontend:test ./frontend
