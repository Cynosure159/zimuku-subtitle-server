name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements.prod.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock pytest-asyncio

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format
        run: ruff format --check .

      - name: Run pytest
        run: |
          export PYTHONPATH=${{ github.workspace }}
          pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Run lint
        working-directory: frontend
        run: npm run lint

  docker:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config

      - name: Validate develop compose file
        run: docker compose -f docker-compose.yml -f docker-compose.develop.yml config

      - name: Build backend runtime image
        run: docker build --file Dockerfile --target runtime --tag zimuku-backend:test .

      - name: Build backend develop image
        run: docker build --file Dockerfile --target develop --tag zimuku-backend:test-develop .

      - name: Build frontend image
        run: docker build --file frontend/Dockerfile --tag zimuku-frontend:test ./frontend

  publish-dockerhub:
    runs-on: ubuntu-latest
    needs:
      - docker
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
      BACKEND_IMAGE_NAME: ${{ vars.DOCKERHUB_BACKEND_REPO || 'zimuku-subtitle-server-backend' }}
      FRONTEND_IMAGE_NAME: ${{ vars.DOCKERHUB_FRONTEND_REPO || 'zimuku-subtitle-server-frontend' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate DockerHub publish settings
        run: |
          test -n "${DOCKERHUB_NAMESPACE}" || {
            echo "Missing repository variable: DOCKERHUB_NAMESPACE"
            exit 1
          }
          test -n "${{ secrets.DOCKERHUB_USERNAME }}" || {
            echo "Missing repository secret: DOCKERHUB_USERNAME"
            exit 1
          }
          test -n "${{ secrets.DOCKERHUB_TOKEN }}" || {
            echo "Missing repository secret: DOCKERHUB_TOKEN"
            exit 1
          }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract backend metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Extract frontend metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push backend runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
