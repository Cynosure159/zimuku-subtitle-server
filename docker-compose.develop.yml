# 这是一个 Compose 覆盖文件，不是完整的独立配置。
# 使用方式：
# docker compose -f docker-compose.yml -f docker-compose.develop.yml ...
#
# 这里只覆盖 develop 模式下与默认配置不同的部分。
# 当前只有后端需要切换到 develop target、develop tag 和源码挂载，
# 前端继续复用 docker-compose.yml 中的定义，因此这里不重复声明 frontend。
services:
  backend:
    image: ${BACKEND_IMAGE:-cynosure159/zimuku-subtitle-server-backend:develop}
    build:
      context: .
      dockerfile: Dockerfile
      target: develop
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      UVICORN_LOG_LEVEL: ${UVICORN_LOG_LEVEL:-debug}
    volumes:
      # 保留基础存储和媒体目录挂载，避免覆盖后丢失默认 volumes。
      - ${ZIMUKU_STORAGE_BIND:-./storage}:/app/storage
      - ${MEDIA_MOVIES_BIND:-./media/movies}:/media/movies:ro
      - ${MEDIA_TV_BIND:-./media/tv}:/media/tv:ro
      # 开发模式下额外挂载后端源码，便于调试和热重载。
      - ./app:/app/app
      - ./run_mcp.py:/app/run_mcp.py
